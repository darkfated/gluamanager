<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLuaManager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg width="0" height="0" class="icon-sprite" aria-hidden="true">
      <symbol id="i-folder" viewBox="0 0 16 16">
        <path d="M1.5 4.5h4l1.4 1.5H14a1 1 0 0 1 1 1v5.5a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2z" />
      </symbol>
      <symbol id="i-scan" viewBox="0 0 16 16">
        <path d="M3 5V3h2M11 3h2v2M13 11v2h-2M5 13H3v-2M5.5 5.5h5v5h-5z" />
      </symbol>
      <symbol id="i-addons" viewBox="0 0 16 16">
        <path d="M3 3.5h10v3H3zm0 6h10v3H3z" />
      </symbol>
      <symbol id="i-settings" viewBox="0 0 16 16">
        <path d="M8 1.8v1.6M8 12.6v1.6M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M1.8 8h1.6M12.6 8h1.6M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1" />
        <circle cx="8" cy="8" r="2.3" />
        <circle cx="8" cy="8" r="4.6" />
      </symbol>
      <symbol id="i-update" viewBox="0 0 16 16">
        <path d="M8 2.5v6m0 0 2.4-2.4M8 8.5 5.6 6.1M3 10.5v1A1.5 1.5 0 0 0 4.5 13h7A1.5 1.5 0 0 0 13 11.5v-1" />
      </symbol>
      <symbol id="i-link" viewBox="0 0 16 16">
        <path d="M6.2 9.8 4.8 11.2a2 2 0 1 1-2.8-2.8l2.1-2.1a2 2 0 0 1 2.8 0m2 3.4 1.4-1.4a2 2 0 1 0-2.8-2.8L5.4 7.6a2 2 0 0 0 0 2.8" />
      </symbol>
      <symbol id="i-external" viewBox="0 0 16 16">
        <path d="M9.5 2.5H13.5V6.5" />
        <path d="M8 8 13.5 2.5" />
        <path d="M13 9.5V12a1.5 1.5 0 0 1-1.5 1.5H4A1.5 1.5 0 0 1 2.5 12V4A1.5 1.5 0 0 1 4 2.5H6.5" />
      </symbol>
      <symbol id="i-github" viewBox="0 0 16 16">
        <path d="M8 1.5a6.5 6.5 0 0 0-2.06 12.67c.33.06.45-.14.45-.32v-1.18c-1.84.4-2.23-.78-2.23-.78-.3-.78-.74-.98-.74-.98-.6-.41.05-.4.05-.4.66.05 1.01.68 1.01.68.59.99 1.54.71 1.92.54.06-.43.23-.71.42-.87-1.47-.17-3.02-.74-3.02-3.31 0-.73.26-1.32.68-1.79-.07-.17-.3-.86.06-1.79 0 0 .56-.18 1.84.68a6.2 6.2 0 0 1 3.35 0c1.28-.86 1.84-.68 1.84-.68.36.93.13 1.62.06 1.79.42.47.68 1.06.68 1.79 0 2.58-1.56 3.14-3.05 3.3.24.21.45.62.45 1.26v1.87c0 .18.12.39.46.32A6.5 6.5 0 0 0 8 1.5Z" />
      </symbol>
      <symbol id="i-info" viewBox="0 0 16 16">
        <path d="M8 2.2a5.8 5.8 0 1 1 0 11.6 5.8 5.8 0 0 1 0-11.6m0 3a.85.85 0 1 0 0 1.7.85.85 0 0 0 0-1.7M7.2 8h1.6v3.2H7.2z" />
      </symbol>
    </svg>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar__main">
          <div class="brand">
            <div class="brand__identity">
              <div class="brand__mark">G</div>
              <div class="brand__copy">
                <strong>GLuaManager</strong>
              </div>
            </div>
          </div>

          <div class="toolbar">
            <label class="field field--inline">
              <input id="root-path" type="text" spellcheck="false" placeholder="" />
            </label>

            <div class="toolbar__actions">
              <button id="choose-folder" class="button button--ghost">
                <svg class="icon"><use href="#i-folder" /></svg>
                <span id="choose-folder-label"></span>
              </button>
              <button id="scan-button" class="button">
                <svg class="icon"><use href="#i-scan" /></svg>
                <span id="scan-button-label"></span>
              </button>
            </div>
          </div>
        </div>

        <div class="topbar__tabs">
          <nav class="tabs" aria-label="Sections">
            <button class="tab is-active" data-tab="addons" id="tab-addons">
              <svg class="icon"><use href="#i-addons" /></svg>
              <span id="tab-addons-label"></span>
            </button>
            <button class="tab" data-tab="settings" id="tab-settings">
              <svg class="icon"><use href="#i-settings" /></svg>
              <span id="tab-settings-label"></span>
            </button>
          </nav>
          <div class="workspace-hint">
            <span id="workspace-hint"></span>
          </div>
        </div>
      </header>

      <section id="update-banner" class="update-banner" hidden>
        <div class="update-banner__copy">
          <svg class="icon"><use href="#i-update" /></svg>
          <div>
            <strong id="update-banner-title"></strong>
            <p id="update-banner-text"></p>
          </div>
        </div>
        <div class="update-banner__actions">
          <button id="update-banner-dismiss" class="button button--ghost"></button>
          <button id="update-banner-install" class="button button--accent"></button>
        </div>
      </section>

      <main class="workspace">
        <section class="view-panel tab-panel is-active" data-panel="addons">
          <div class="view-header">
            <div class="view-title">
              <svg class="icon"><use href="#i-addons" /></svg>
              <h1 id="addons-title"></h1>
            </div>

            <div class="view-actions">
              <p id="status-text" class="status-inline"></p>
              <span id="updates-pill" class="info-pill"></span>
              <button id="check-button" class="button button--ghost"></button>
              <button id="update-all-button" class="button button--accent"></button>
            </div>
          </div>

          <div class="view-body">
            <section class="view-section">
              <div class="section-head section-head--compact">
                <h2 id="installed-title">Installed</h2>
              </div>
              <div id="installed-addon-list" class="addon-grid"></div>
            </section>

            <section class="view-section">
              <div class="section-head section-head--compact">
                <h2 id="available-title">Available</h2>
              </div>
              <div id="available-addon-list" class="addon-grid addon-grid--available"></div>
            </section>
          </div>
        </section>

        <section class="view-panel tab-panel" data-panel="settings" hidden>
          <div class="view-header">
            <div class="view-title">
              <svg class="icon"><use href="#i-settings" /></svg>
              <h1 id="settings-title"></h1>
            </div>
            <div class="view-actions view-actions--placeholder" aria-hidden="true"></div>
          </div>

          <div class="view-body">
            <section class="view-section">
              <div class="section-head section-head--compact">
                <svg class="icon"><use href="#i-info" /></svg>
                <h2 id="app-version-label"></h2>
              </div>

              <div class="settings-surface">
                <div class="settings-row">
                  <div class="settings-row__label" id="app-version-text"></div>
                  <div class="settings-row__value" id="app-version-value"></div>
                </div>
                <div class="settings-row">
                  <div class="settings-row__label" id="app-update-label"></div>
                  <div class="settings-row__value settings-row__value--update">
                    <span id="app-update-value"></span>
                    <button id="app-update-button" class="button button--accent" hidden></button>
                  </div>
                </div>
              </div>
            </section>

            <section class="view-section">
              <div class="section-head section-head--compact">
                <svg class="icon"><use href="#i-settings" /></svg>
                <h2 id="language-label"></h2>
              </div>

              <div class="settings-surface">
                <div class="select-wrap select-wrap--wide">
                  <select id="language-select" class="select-field">
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                  </select>
                </div>
              </div>
            </section>

            <section class="view-section">
              <div class="section-head section-head--compact">
                <svg class="icon"><use href="#i-link" /></svg>
                <h2 id="sources-title"></h2>
              </div>

              <div class="settings-surface settings-surface--sources">
                <div class="source-toolbar">
                  <label class="field field--inline source-toolbar__field">
                    <input id="source-input" type="text" spellcheck="false" placeholder="" />
                  </label>
                  <button id="add-source-button" class="button button--accent"></button>
                </div>

                <div class="status-line">
                  <p id="sources-status-text"></p>
                </div>

                <div id="source-list" class="source-list"></div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div id="addon-modal" class="modal" hidden>
      <div class="modal__backdrop" data-close-modal="true"></div>
      <div class="modal__dialog panel" role="dialog" aria-modal="true">
        <div class="modal__header">
          <div class="modal__heading">
            <h2 id="modal-title"></h2>
            <p id="modal-subtitle"></p>
          </div>
          <button id="close-modal" class="icon-button" aria-label="Close">
            <svg class="icon-button__close" viewBox="0 0 12 12" aria-hidden="true">
              <path d="M2.5 2.5 9.5 9.5" />
              <path d="M9.5 2.5 2.5 9.5" />
            </svg>
          </button>
        </div>

        <div class="modal__body">
          <aside class="modal__summary">
            <div class="version-band" id="modal-version-band"></div>
            <div class="metric-card">
              <span id="label-installed-version"></span>
              <strong id="modal-installed-version"></strong>
            </div>
            <div class="metric-card">
              <span id="label-remote-version"></span>
              <strong id="modal-remote-version"></strong>
            </div>
            <div class="metric-card">
              <span id="label-state"></span>
              <strong id="modal-state"></strong>
            </div>
          </aside>

          <div class="modal__content">
            <div id="modal-repository-inline" class="modal__repository-inline"></div>
            <div class="modal-tabs" role="tablist" aria-label="Addon details">
              <button id="modal-tab-info" class="modal-tab is-active" data-modal-tab="info"></button>
              <button id="modal-tab-readme" class="modal-tab" data-modal-tab="readme"></button>
            </div>

            <div class="modal-tab-panel is-active" data-modal-panel="info">
              <section class="modal__section">
                <div class="modal__section-head">
                  <span id="label-description"></span>
                </div>
                <div id="modal-description" class="readme-view readme-view--inline"></div>
              </section>

              <div class="modal__split modal__split--single">
                <section class="modal__section">
                  <div class="modal__section-head">
                    <span id="label-folder"></span>
                  </div>
                  <div class="info-block">
                    <code id="modal-folder"></code>
                  </div>
                </section>
              </div>

              <section class="modal__section">
                <div class="modal__section-head">
                  <span id="label-preserve"></span>
                </div>
                <div id="modal-preserve" class="preserve-list"></div>
              </section>

              <section class="modal__section">
                <div class="modal__section-head">
                  <span id="label-dependencies"></span>
                </div>
                <div id="modal-dependencies" class="dependency-list"></div>
              </section>
            </div>

            <div class="modal-tab-panel" data-modal-panel="readme" hidden>
              <section class="modal__section modal__section--readme">
                <div id="modal-readme" class="readme-view"></div>
              </section>
            </div>
          </div>
        </div>

        <div class="modal__footer">
          <button id="modal-rollback-button" class="button button--ghost" hidden></button>
          <button id="modal-install-button" class="button button--accent" hidden></button>
          <button id="modal-update-button" class="button button--accent"></button>
        </div>

        <div id="install-confirm" class="install-confirm" hidden>
          <div class="install-confirm__card">
            <div class="install-confirm__head">
              <strong id="install-confirm-title"></strong>
              <p id="install-confirm-text"></p>
            </div>
            <div id="install-confirm-list" class="install-confirm__list"></div>
            <div class="install-confirm__actions">
              <button id="install-confirm-cancel" class="button button--ghost"></button>
              <button id="install-confirm-accept" class="button button--accent"></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
